name: FEC Outside Spending — Failsafe Pull

# Runs twice daily as a backup to the continuous local Mac process, which
# only polls while the laptop is awake with the lid open. This job pulls
# independently on GitHub's servers regardless of the Mac's state.

on:
  schedule:
    - cron: "0 11,21 * * *"  # 7am/5pm EDT (UTC-4). After Nov 2 DST ends, this
                              # runs 6am/4pm EST (UTC-5) until the cron is updated.
  workflow_dispatch:          # allow manual runs from GitHub UI

jobs:
  pull:
    runs-on: ubuntu-latest

    env:
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      WORKDIR: "Desktop/Detroit News/Data/campaign_finance/instance/FEC_071526"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r "$WORKDIR/code/requirements.txt"

      # Both monitor.py (parses downloaded filings into CSV) and
      # outside_spending.py's RSS fast-path need the fastfec binary. It's
      # only installed locally via Homebrew, so the runner needs its own copy.
      - name: Install FastFEC
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo washingtonpost/FastFEC \
            --pattern "fastfec-linux-gnu-x86_64-*.zip" --dir /tmp/fastfec --clobber
          unzip -o /tmp/fastfec/*.zip -d /tmp/fastfec
          sudo mv /tmp/fastfec/fastfec /usr/local/bin/fastfec
          chmod +x /usr/local/bin/fastfec
          fastfec -h || true

      - name: Write Google service account credentials
        run: echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > "$WORKDIR/service-account.json"

      # Without this, every scheduled run starts from a totally clean
      # checkout -- no prior downloaded filings, no per-contest fallback
      # cache. That means a single transient API failure DURING a
      # scheduled run has nothing to fall back on and can push zeroed
      # data live, uncorrected until the next scheduled run (up to ~10
      # hours later) if the local Mac process isn't also running to
      # overwrite it sooner. Restoring these directories gives this job
      # the same fallback protection the local process already has.
      - name: Restore FEC pull cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.WORKDIR }}/raw
            ${{ env.WORKDIR }}/raw_preprimary
            ${{ env.WORKDIR }}/.monitor_state.json
            ${{ env.WORKDIR }}/.monitor_preprimary_state.json
            ${{ env.WORKDIR }}/.se_contest_cache
            ${{ env.WORKDIR }}/.se_filing_cache
            ${{ env.WORKDIR }}/.known_spenders.json
            ${{ env.WORKDIR }}/.committee_names.json
          key: fec-pull-cache-${{ github.run_id }}
          restore-keys: |
            fec-pull-cache-

      # Keeps the cands_Q2 tab itself current. No longer feeds the Flourish
      # graphics tabs -- see the pre-primary step below for that.
      - name: Run candidate committee pull (Q2)
        run: |
          cd "$WORKDIR/code"
          python3 monitor.py \
            --candidates candidates.csv \
            --output-dir '..' \
            --cycle 2026 \
            --quarter Q2 \
            --worksheet "cands_Q2" \
            --credentials "../service-account.json" \
            --once

      # groupspend.py/overallspend.py source campaign spend from
      # campaign_finance_2026_preprimary.csv (written here) -- the 12-day
      # pre-primary filing, more current than the Q2 quarterly filing.
      # On a fresh checkout that file doesn't exist yet, so without this
      # step the Flourish tabs' campaign totals silently zero out.
      - name: Run pre-primary pull
        run: |
          cd "$WORKDIR/code"
          python3 monitor_preprimary.py \
            --candidates candidates.csv \
            --output-dir '..' \
            --worksheet "cands_preprimary" \
            --credentials "../service-account.json" \
            --once

      - name: Run outside-spending pull
        run: |
          cd "$WORKDIR/code"
          python3 outside_spending.py \
            --candidates candidates.csv \
            --output-dir '..' \
            --cycle 2026 \
            --worksheet "outside_spend_TEST_Q2" \
            --credentials "../service-account.json" \
            --once

      - name: Save FEC pull cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.WORKDIR }}/raw
            ${{ env.WORKDIR }}/raw_preprimary
            ${{ env.WORKDIR }}/.monitor_state.json
            ${{ env.WORKDIR }}/.monitor_preprimary_state.json
            ${{ env.WORKDIR }}/.se_contest_cache
            ${{ env.WORKDIR }}/.se_filing_cache
            ${{ env.WORKDIR }}/.known_spenders.json
            ${{ env.WORKDIR }}/.committee_names.json
          key: fec-pull-cache-${{ github.run_id }}
