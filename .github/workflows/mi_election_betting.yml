name: Michigan Election Betting — Daily Pull

on:
  schedule:
    - cron: "0 12 * * *"  # 8am EDT (UTC-4)
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run scrapers
        run: |
          cd mi-election-betting/code
          python3 run_all.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mi-election-betting/data/
          git diff --cached --quiet || git commit -m "data: daily pull $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
